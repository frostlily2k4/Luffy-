<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Anime Character</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <img src="https://upload.wikimedia.org/wikipedia/en/c/cb/Monkey_D_Luffy.png" alt="Luffy">

    <h1>Monkey D. Luffy</h1>
    <h3>🏴‍☠️ Future King of the Pirates</h3>

    <div id="details">

        <p><strong>Anime:</strong> One Piece</p>
        <p><strong>Birthday:</strong> May 5</p>
        <p><strong>Age:</strong> 19</p>
        <p><strong>Crew:</strong> Straw Hat Pirates</p>
        <p><strong>Role:</strong> Captain</p>
        <p><strong>Devil Fruit:</strong> Hito Hito no Mi, Model: Nika</p>
        <p><strong>Bounty:</strong> 3,000,000,000 Berries</p>

        <label>Power Level</label>

        <progress value="98" max="100"></progress>

        <p><strong>Favorite Quote:</strong></p>

        <blockquote>
            "I'm gonna be King of the Pirates!"
        </blockquote>

    </div>

    <button onclick="showFact()">Fun Fact</button>

    <button onclick="toggleDetails()">Show / Hide Details</button>

    <p id="fact"></p>

</div>

<script src="script.js"></script>

</body>
</html>
